<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면을 왼쪽과 오른쪽으로 2분할하는 메인 컨테이너 */
        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽: 검색창 및 결과 리스트 영역 */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* 검색창 구역 */
        .search-box {
            padding: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .search-form {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-button {
            padding: 10px 15px;
            background-color: #fee500; /* 카카오 시그니처 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #191919;
        }

        .search-button:hover {
            background-color: #fada0a;
        }

        /* 검색 결과 리스트 구역 (스크롤 가능) */
        .places-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .place-item {
            padding: 15px;
            background-color: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        /* 오른쪽: 지도 영역 */
        .map-container {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 왼쪽 사이드바 (검색 + 결과) -->
        <div class="sidebar">
            <div class="search-box">
                <form class="search-form" onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" class="search-input" placeholder="장소를 입력하세요 (예: 강남역맛집)" value="이태원 맛집">
                    <button type="submit" class="search-button">검색</button>
                </form>
            </div>
            <!-- 검색 결과가 여기에 동적으로 추가됩니다 -->
            <div id="placesList" class="places-list">
                <p style="color: #6c757d; text-align: center; margin-top: 20px;">검색 결과가 여기에 표시됩니다.</p>
            </div>
        </div>

        <!-- 오른쪽 지도 영역 -->
        <div id="map" class="map-container"></div>
    </div>

    <!-- 카카오 지도 라이브러리 스크립트 (services 라이브러리 포함) -->
    <!-- 지도가 완전히 로드된 후 실행되도록 autoload=false 설정을 추가했습니다. -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=9b337fd89d8eb3bbe8bf74a10b71d522&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 선언
        let map;
        let placeSearch;

        // 카카오 스크립트가 완전히 로드된 후 실행되도록 보장하는 kakao.maps.load
        kakao.maps.load(function() {
            initMap();
        });

        // 지도를 초기화하는 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 허용 전 기본 중심좌표 (서울시청)
                level: 5 // 요구사항: 지도 확대 레벨 5
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 객체 생성
            placeSearch = new kakao.maps.services.Places();

            // 사용자의 현재 위치(HTML5 Geolocation) 가져오기
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const currentLat = position.coords.latitude;  // 위도
                    const currentLng = position.coords.longitude; // 경도
                    
                    const currentPos = new kakao.maps.LatLng(currentLat, currentLng);
                    
                    // 지도의 중심을 현재 위치로 이동
                    map.setCenter(currentPos);
                    
                    // 현재 위치에 마커 하나 찍어주기
                    const currentMarker = new kakao.maps.Marker({
                        map: map,
                        position: currentPos
                    });
                    
                }, function(error) {
                    console.error("위치 정보를 가져오는 데 실패했습니다.", error);
                    alert("위치 권한을 허용해주시면 현재 위치를 중심으로 지도가 표시됩니다.");
                });
            } else {
                alert("이 브라우저에서는 위치 서비스(Geolocation)를 지원하지 않습니다.");
            }
        }

        // 키워드 장소 검색을 실행하는 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return false;
            }

            // 카카오 키워드 검색 서비스 호출
            placeSearch.keywordSearch(keyword, placesSearchCB);
        }

        // 장소검색이 완료됐을 때 호출되는 콜백함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 검색 성공 시 결과 리스트 표시 및 지도 마커 표시
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과를 왼쪽 리스트에 보여주는 함수
        function displayPlaces(places) {
            const listElement = document.getElementById('placesList');
            
            // 기존 검색 결과 지우기
            listElement.innerHTML = '';

            // 지도에 표시된 기존 마커들을 지우는 로직이나 새 마커를 찍는 코드를 여기에 확장할 수 있습니다.
            // 여기서는 HTML/CSS 분할 레이아웃과 구동에 집중하여 리스트 표기 기본 기능만 구현했습니다.
            places.forEach(function(place) {
                const itemElement = document.createElement('div');
                itemElement.className = 'place-item';
                
                itemElement.innerHTML = `
                    <h4 style="margin-bottom: 5px; color: #333;">${place.place_name}</h4>
                    <p style="font-size: 12px; color: #666;">${place.road_address_name ? place.road_address_name : place.address_name}</p>
                    <span style="font-size: 11px; color: #999;">${place.phone}</span>
                `;
                
                listElement.appendChild(itemElement);
            });
        }
    </script>
</body>
</html>
